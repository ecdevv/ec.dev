    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background-color: #0d1117; }

      #bs .bw {
        width: 100%; max-width: 820px;
        border: none; border-radius: 0; box-shadow: none; overflow: visible;
        margin-top: auto; margin-bottom: auto;
      }

      #bs .bb {
        background: #0d1117; padding: 3rem 3rem 1.5rem; min-height: 320px;
        font: 13px/1.5rem 'JetBrains Mono', 'Courier New', monospace;
      }
      .bl-hdr { color: #fff; font-weight: 600; display: block; }
      .bl-sub { color: rgba(255,255,255,0.4); display: block; }
      .bl-inf { color: rgba(255,255,255,0.3); display: block; margin-top: 4px; }
      .bl-wel { color: rgba(104,211,145,1);   display: block; margin-top: 8px; }
      .bl-blk { display: block; height: 12px; }
      .bl-row { display: flex; align-items: center; gap: 12px; }

      .bl-ok {
        font-size: 12px; letter-spacing: 0.05em; flex-shrink: 0;
        color: rgba(104,211,145,1);
        transition: color 0.12s ease;
      }
      .bl-ok--wait { color: rgba(255,255,255,0.15); }
      .bl-txt { color: rgba(255,255,255,0.6); flex: 1; }
      .bl-bar { color: rgba(104,211,145,0.65); flex-shrink: 0; }

      .bcur {
        display: inline-block; width: 8px; height: 0.85em;
        background: rgba(104,211,145,1); vertical-align: middle;
        animation: bcur 1s ease-in-out infinite;
      }
      @keyframes bcur { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

      #bs .bctrl {
        background: #0d1117; border-top: none; padding: 8px 3rem 24px; display: flex;
      }
      .bskip {
        font: 12px/1 'JetBrains Mono', 'Courier New', monospace;
        color: rgba(255,255,255,0.3); background: none; border: none; cursor: pointer; padding: 0;
      }
      .bskip:hover   { color: rgba(255,255,255,0.6); }
      .bkey-esc      { color: rgba(255,255,255,0.4); }
      .bkey-enter    { color: rgba(99,179,237,1); }

      @media (max-width: 480px) {
        #bs .bb     { font-size: 11px; padding: 1.5rem 1.5rem 1rem; min-height: 260px; }
        #bs .bctrl  { padding: 8px 1.5rem 16px; }
        .bl-txt { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
      }
      @media (max-height: 500px) {
        #bs .bb     { font-size: 11px; line-height: 1.2rem; padding: 1rem 1.5rem 0.5rem; min-height: 0; }
        .bl-blk { height: 4px; }
        #bs .bctrl  { padding: 6px 1.5rem 10px; }
      }
      @media (min-width: 769px) and (min-height: 600px) {
        #bs .bb { font-size: 14px; padding: 4rem 4rem 2rem; min-height: 360px; }
      }

      /* -- Boot overlay ---------------------------------------------------------- */
      #bs {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: flex-start; justify-content: center; padding: 1rem;
        background: #0d1117; overflow-y: auto;
        transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #bs.replay { background: #0d1117; }
      #bs.out    { opacity: 0; transform: translateY(-80px); pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      var LINES = [
        { k:'hdr', t:'ecdevv-os UEFI v0.1.3' },
        { k:'sub', t:'Copyright (C) 2026 ecdevv. All rights reserved.' },
        { k:'blk' },
        { k:'inf', t:'Firmware: 0.4.2   CPU: x86_64   RAM: 65536 MB OK' },
        { k:'blk' },
        { k:'ok',  t:'Starting kernel',          full: true },
        { k:'ok',  t:'Initializing CPU cores [24]', full: true },
        { k:'ok',  t:'Loading display manager' },
        { k:'ok',  t:'Mounting filesystem' },
        { k:'ok',  t:'Starting network manager' },
        { k:'ok',  t:'Initializing portfolio services' },
        { k:'ok',  t:'Loading project manifests' },
        { k:'ok',  t:'Starting user session' },
        { k:'ok',  t:'Reached target: multi-user.target' },
        { k:'blk' },
        { k:'wel', t:'ecdevv-os - logged in as visitor' },
      ];

      var MS        = 110;  // ms between lines
      var THRESHOLD = 500;  // ms - skip boot if page loads within this
      var BAR_TOTAL = window.innerWidth < 480 ? 16 : 24;  // narrower bar on mobile
      var BAR_MIN   = 60;   // ms/cell min (cosmetic)
      var BAR_MAX   = 160;  // ms/cell max (cosmetic)

      window.__bootDone = false;

      window.__bootPromise = new Promise(function (resolve) {
        window.__bootResolve = resolve;
      });

      function rnd(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }

      function makeBarText(filled, total) {
        if (filled >= total) return '[' + '-'.repeat(total) + ']';
        var pac = '<span style="display:inline-block;width:1ch;text-align:center">ᗧ</span>';
        return '[' + '-'.repeat(filled) + pac + '·'.repeat(total - filled - 1) + ']';
      }

      function markDone(entry) {
        entry.done = true;
        entry.ok.textContent = '[  OK  ]';
        entry.ok.classList.remove('bl-ok--wait');
      }

      function nextDelay() {
        var r = Math.random();
        if (r < 0.10) return rnd(250, 500);
        if (r < 0.20) return Math.max(4, BAR_MIN >> 1);
        return rnd(BAR_MIN, BAR_MAX);
      }

      function animateBar(entry, tickMs, onDone) {
        clearTimeout(entry.tid);
        if (entry.done) { if (onDone) onDone(); return; }
        function tick() {
          entry.filled++;
          entry.el.innerHTML = makeBarText(entry.filled, BAR_TOTAL);
          if (entry.filled >= BAR_TOTAL) { markDone(entry); if (onDone) onDone(); return; }
          if (!entry.unlocked && entry.filled >= entry.hardCap) return; // hard stall
          var delay;
          if (tickMs !== undefined) {
            delay = tickMs;
          } else if (entry.filled >= entry.softCap) {
            delay = rnd(800, 2000); // very slow crawl - simulates stalled loading
          } else {
            delay = nextDelay();
          }
          entry.tid = setTimeout(tick, delay);
        }
        tick();
      }

      function rushBars(bars, onAllDone) {
        var pending = bars.filter(function(e) { return !e.done; });
        if (!pending.length) { if (onAllDone) onAllDone(); return; }
        var finished = 0;
        pending.forEach(function(entry, i) {
          setTimeout(function() {
            entry.unlocked = true; // bypass hard cap
            animateBar(entry, 8, function() {
              if (++finished === pending.length && onAllDone) onAllDone();
            });
          }, i * 35);
        });
      }

      function addLine(bb, bc, l, bars, immediate) {
        var d = document.createElement('div');
        if      (l.k === 'blk') { d.className = 'bl-blk'; }
        else if (l.k === 'hdr') { d.className = 'bl-hdr'; d.textContent = l.t; }
        else if (l.k === 'sub') { d.className = 'bl-sub'; d.textContent = l.t; }
        else if (l.k === 'inf') { d.className = 'bl-inf'; d.textContent = l.t; }
        else if (l.k === 'wel') { d.className = 'bl-wel'; d.textContent = l.t; }
        else if (l.k === 'ok') {
          d.className = 'bl-row';
          var ok  = document.createElement('span'); ok.className = 'bl-ok bl-ok--wait'; ok.textContent = '[      ]';
          var tx  = document.createElement('span'); tx.className = 'bl-txt'; tx.textContent = l.t;
          var bar = document.createElement('span'); bar.className = 'bl-bar';
          var hardCap = l.full ? BAR_TOTAL : rnd(Math.round(BAR_TOTAL * 0.79), Math.round(BAR_TOTAL * 0.96));
          var softFloor = Math.round(BAR_TOTAL / 3);
          var entry = {
            el: bar, ok: ok, filled: 0, done: false, tid: null, unlocked: false,
            hardCap: hardCap,
            softCap: Math.random() < 0.4 ? hardCap : rnd(softFloor, Math.max(softFloor, hardCap - 2))
          };
          bars.push(entry);
          if (immediate) {
            entry.filled = BAR_TOTAL;
            bar.innerHTML = makeBarText(BAR_TOTAL, BAR_TOTAL);
            markDone(entry);
          } else {
            bar.innerHTML = makeBarText(0, BAR_TOTAL);
            animateBar(entry);
          }
          d.appendChild(ok); d.appendChild(tx); d.appendChild(bar);
        }
        bb.insertBefore(d, bc);
      }

      function showBoot(isShell, onComplete) {
        var s = document.createElement('div');
        s.id = 'bs';
        if (isShell) s.classList.add('replay');
        s.innerHTML =
          '<div class="bw">' +
            '<div class="bb"><span class="bcur"></span></div>' +
            '<div class="bctrl"><button class="bskip"><span class="bkey-esc">[ESC]</span> skip</button></div>' +
          '</div>';
        document.body.appendChild(s);

        var bb  = s.querySelector('.bb');
        var bc  = s.querySelector('.bcur');
        var btn = s.querySelector('.bskip');
        var bars = [];
        var n = 0, shellDone = false, exiting = false, tid = null;

        function bExit() {
          if (exiting) return;
          exiting = true;
          clearTimeout(tid);
          bars.forEach(function(e) { clearTimeout(e.tid); });
          window.removeEventListener('load', onLoad);
          document.removeEventListener('keydown', onKey);
          s.classList.add('out');
          setTimeout(function () { s.remove(); if (onComplete) onComplete(); }, 450);
        }

        function next() {
          if (n >= LINES.length) {
            if (isShell) {
              tid = setTimeout(function() {
                rushBars(bars, function() {
                  shellDone = true;
                  btn.innerHTML = '<span class="bkey-enter">[ENTER]</span> continue';
                  btn.onclick = bExit;
                });
              }, 2500);
            }
            return;
          }
          addLine(bb, bc, LINES[n++], bars);
          tid = setTimeout(next, MS);
        }

        function onLoad() {
          clearTimeout(tid);
          while (n < LINES.length) addLine(bb, bc, LINES[n++], bars, true);
          rushBars(bars, function() {
            setTimeout(bExit, 200);
          });
        }

        function onKey(e) {
          if (!isShell) return;
          if (e.key === 'Escape') { bExit(); return; }
          if (shellDone && (e.key === 'Enter' || e.key === ' ')) bExit();
        }

        if (isShell) {
          btn.onclick = bExit;
        } else {
          btn.parentElement.style.display = 'none';
        }
        document.addEventListener('keydown', onKey);
        if (!isShell) window.addEventListener('load', onLoad);

        next();
      }

      // -- Initial page load --------------------------------------
      (function () {
        var thresholdPassed = false;

        function onFastLoad() {
          if (thresholdPassed) return;
          clearTimeout(thresholdTimer);
          window.__bootDone = true;
          window.__bootResolve();
        }
        window.addEventListener('load', onFastLoad);

        var thresholdTimer = setTimeout(function () {
          thresholdPassed = true;
          window.removeEventListener('load', onFastLoad);
          showBoot(false, function () {
            window.__bootDone = true;
            window.__bootResolve();
          });
        }, THRESHOLD);
      })();

      window.bReplay = function (onDone) { showBoot(true, onDone); };
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
